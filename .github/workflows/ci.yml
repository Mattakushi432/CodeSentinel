name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app/ tests/

      - name: Run tests
        run: pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=85
        env:
          SECRET_KEY: test-secret-key-for-ci
          DATABASE_URL: sqlite:///./test.db
          LLM_PROVIDER: ollama
          OLLAMA_BASE_URL: http://localhost:11434

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t codesentinel:test .

      - name: Smoke test container
        run: |
          docker run -d --name cs_test \
            -e SECRET_KEY=ci-test-key \
            -e DATABASE_URL=sqlite:///./data/test.db \
            -e DEV_MODE=true \
            -p 8000:8000 \
            codesentinel:test
          sleep 5
          curl -f http://localhost:8000/health
          docker stop cs_test
