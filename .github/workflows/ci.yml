name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app/ tests/

      - name: Run tests
        run: pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=85
        env:
          SECRET_KEY: test-secret-key-for-ci-that-is-long-enough
          DATABASE_URL: sqlite:///./test.db
          LLM_PROVIDER: ollama
          OLLAMA_BASE_URL: http://localhost:11434
          DEV_MODE: "true"

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t codesentinel:test .

      - name: Smoke test container
        run: |
          docker run -d --name cs_test \
            -e SECRET_KEY=ci-test-key-long-enough-for-32-chars-x \
            -e DATABASE_URL=sqlite:///./data/test.db \
            -e DEV_MODE=true \
            -p 8000:8000 \
            codesentinel:test
          for i in $(seq 1 15); do
            curl -sf http://localhost:8000/health && break
            echo "Waiting for app... ($i/15)"
            sleep 2
          done
          docker logs cs_test
          curl -f http://localhost:8000/health
          docker stop cs_test
