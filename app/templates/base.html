<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CodeSentinel{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  <script src="/static/js/htmx.min.js" defer></script>
</head>
<body>

<!-- Ambient background -->
<div class="bg-scene" aria-hidden="true">
  <div class="bg-grid"></div>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
</div>

{% if user %}
<div class="app-layout">

  <!-- Sidebar -->
  <nav class="sidebar" aria-label="Main navigation">
    <div class="sidebar-header">
      <div class="sidebar-logo-icon">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="sg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#3b82f6"/>
              <stop offset="100%" stop-color="#8b5cf6"/>
            </linearGradient>
          </defs>
          <path d="M16 2.5L4.5 7.5v8.5c0 7.2 5 13.9 11.5 15.5C22.5 29.9 27.5 23.2 27.5 16V7.5L16 2.5z" fill="url(#sg)" opacity="0.95"/>
          <ellipse cx="16" cy="16" rx="4.5" ry="3.2" stroke="white" stroke-width="1.4" fill="none" opacity="0.9"/>
          <circle cx="16" cy="16" r="1.4" fill="white" opacity="0.95"/>
        </svg>
      </div>
      <div class="sidebar-brand">
        <span class="sidebar-logo-text">CodeSentinel</span>
        <span class="sidebar-beta">beta</span>
      </div>
    </div>

    <div class="sidebar-nav">
      <a href="/" class="nav-item {% if request.url.path == '/' %}active{% endif %}"
         aria-current="{% if request.url.path == '/' %}page{% endif %}">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Dashboard
      </a>

      <a href="/repos" class="nav-item {% if request.url.path == '/repos' or request.url.path.startswith('/repos/') %}active{% endif %}"
         aria-current="{% if request.url.path == '/repos' or request.url.path.startswith('/repos/') %}page{% endif %}">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
        </svg>
        Repositories
      </a>

      <a href="/reviews" class="nav-item {% if request.url.path == '/reviews' or request.url.path.startswith('/reviews/') %}active{% endif %}"
         aria-current="{% if request.url.path == '/reviews' or request.url.path.startswith('/reviews/') %}page{% endif %}">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        Reviews
      </a>

      <a href="/rules" class="nav-item {% if request.url.path == '/rules' or request.url.path.startswith('/rules/') %}active{% endif %}"
         aria-current="{% if request.url.path == '/rules' or request.url.path.startswith('/rules/') %}page{% endif %}">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        Rules
      </a>

    </div>

    <div class="sidebar-footer">
      <div class="sidebar-user-email" title="{{ user.email }}">{{ user.email }}</div>
      <a href="/auth/logout" class="sidebar-signout">Sign out</a>
    </div>
  </nav>

  <!-- Main content -->
  <main class="main-content">
    <div class="main-inner">
      {% block content %}{% endblock %}
    </div>
  </main>
</div>

{% else %}
{% block auth_canvas %}{% endblock %}
<main class="auth-wrap">
  {% block auth_content %}{% endblock %}
</main>
{% endif %}

<script nonce="{{ request.state.csp_nonce }}">
(function () {
  function initTilt() {
    document.querySelectorAll('[data-tilt]').forEach(function (el) {
      var rect;
      el.addEventListener('mouseenter', function () {
        rect = el.getBoundingClientRect();
        el.style.transition = 'box-shadow 0.3s ease';
      });
      el.addEventListener('mousemove', function (e) {
        if (!rect) return;
        var x = (e.clientX - rect.left) / rect.width - 0.5;
        var y = (e.clientY - rect.top) / rect.height - 0.5;
        el.style.transform =
          'perspective(700px) rotateY(' + (x * 12) + 'deg) rotateX(' + (-y * 8) + 'deg) translateZ(8px)';
        el.style.transition = 'transform 0.05s linear';
      });
      el.addEventListener('mouseleave', function () {
        el.style.transform = 'perspective(700px) rotateY(0deg) rotateX(0deg) translateZ(0)';
        el.style.transition = 'transform 0.5s cubic-bezier(0.23,1,0.32,1), box-shadow 0.3s ease';
      });
    });
  }

  initTilt();
  document.body.addEventListener('htmx:afterSwap', initTilt);
})();
</script>

{% block page_scripts %}{% endblock %}
</body>
</html>
