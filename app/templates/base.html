<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CodeSentinel{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.3/dist/htmx.min.js"></script>
  <style>
    .status-pending  { @apply text-yellow-400 bg-yellow-400/10 }
    .status-processing { @apply text-blue-400 bg-blue-400/10 }
    .status-done     { @apply text-green-400 bg-green-400/10 }
    .status-error    { @apply text-red-400 bg-red-400/10 }
    .status-skipped  { @apply text-gray-400 bg-gray-400/10 }
  </style>
</head>
<body class="h-full text-gray-100">

{% if user %}
<div class="min-h-full flex">
  <!-- Sidebar -->
  <nav class="w-56 bg-gray-900 border-r border-gray-800 flex flex-col">
    <div class="px-4 py-5 border-b border-gray-800">
      <span class="text-white font-bold text-lg">CodeSentinel</span>
      <span class="ml-2 text-xs text-blue-400 font-medium px-1.5 py-0.5 bg-blue-400/10 rounded">beta</span>
    </div>

    <div class="flex-1 py-4 space-y-1 px-2">
      <a href="/" class="flex items-center gap-2 px-3 py-2 rounded-md text-sm {% if request.url.path == '/' %}bg-gray-800 text-white{% else %}text-gray-400 hover:text-white hover:bg-gray-800{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Dashboard
      </a>
      <a href="/repos" class="flex items-center gap-2 px-3 py-2 rounded-md text-sm {% if '/repos' in request.url.path %}bg-gray-800 text-white{% else %}text-gray-400 hover:text-white hover:bg-gray-800{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
        Repositories
      </a>
      <a href="/reviews" class="flex items-center gap-2 px-3 py-2 rounded-md text-sm {% if '/reviews' in request.url.path %}bg-gray-800 text-white{% else %}text-gray-400 hover:text-white hover:bg-gray-800{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        Reviews
      </a>
      <a href="/rules" class="flex items-center gap-2 px-3 py-2 rounded-md text-sm {% if '/rules' in request.url.path %}bg-gray-800 text-white{% else %}text-gray-400 hover:text-white hover:bg-gray-800{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Rules
      </a>
      <a href="/billing" class="flex items-center gap-2 px-3 py-2 rounded-md text-sm {% if '/billing' in request.url.path %}bg-gray-800 text-white{% else %}text-gray-400 hover:text-white hover:bg-gray-800{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
        Billing
      </a>
    </div>

    <div class="px-4 py-4 border-t border-gray-800">
      <div class="text-xs text-gray-500 mb-2">{{ user.email }}</div>
      {% if org %}
      <span class="text-xs px-2 py-0.5 rounded font-medium
        {% if org.plan == 'team' %}bg-purple-500/20 text-purple-400
        {% elif org.plan == 'pro' %}bg-blue-500/20 text-blue-400
        {% else %}bg-gray-700 text-gray-400{% endif %}">
        {{ org.plan | upper }}
      </span>
      {% endif %}
      <a href="/auth/logout" class="block mt-2 text-xs text-gray-500 hover:text-gray-300">Sign out</a>
    </div>
  </nav>

  <!-- Main content -->
  <main class="flex-1 overflow-auto">
    <div class="max-w-5xl mx-auto px-6 py-8">
      {% block content %}{% endblock %}
    </div>
  </main>
</div>
{% else %}
<main class="min-h-full flex items-center justify-center">
  {% block auth_content %}{% endblock %}
</main>
{% endif %}

</body>
</html>
