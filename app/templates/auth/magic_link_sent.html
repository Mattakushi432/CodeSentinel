{% extends "base.html" %}
{% block title %}Check your email — CodeSentinel{% endblock %}

{% block auth_content %}
<div class="auth-card auth-card-center">
  <div class="magic-icon-ring" aria-hidden="true">
    <svg class="magic-icon-svg" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
    </svg>
  </div>
  <h2 class="auth-confirm-title">Check your email</h2>
  <p class="text-muted auth-confirm-sub">We sent a magic link to</p>
  <p class="auth-confirm-email">{{ email }}</p>
  <p class="text-muted auth-confirm-expiry">Link expires in 15 minutes.</p>
  <a href="/auth/login" class="link-blue auth-confirm-back">← Try a different email</a>
</div>
{% endblock %}
