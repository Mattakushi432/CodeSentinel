{% extends "base.html" %}

{% block title %}Check your email — CodeSentinel{% endblock %}

{% block auth_content %}
<div class="w-full max-w-sm text-center">
  <div class="bg-gray-900 border border-gray-800 rounded-xl p-8">
    <div class="w-12 h-12 bg-blue-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
      <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
      </svg>
    </div>
    <h2 class="text-lg font-semibold text-white mb-2">Check your email</h2>
    <p class="text-sm text-gray-400">
      We sent a magic link to<br>
      <span class="text-white font-medium">{{ email }}</span>
    </p>
    <p class="text-xs text-gray-500 mt-4">Link expires in 15 minutes.</p>
    <a href="/auth/login" class="block mt-6 text-sm text-blue-400 hover:text-blue-300">← Try a different email</a>
  </div>
</div>
{% endblock %}
