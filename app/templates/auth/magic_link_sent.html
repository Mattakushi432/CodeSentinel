{% extends "base.html" %}
{% block title %}Check your email — CodeSentinel{% endblock %}

{% block auth_content %}
<div class="auth-card" style="text-align:center;">
  <div style="width:52px;height:52px;border-radius:50%;background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.25);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;">
    <svg style="width:24px;height:24px;color:#60a5fa;" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
    </svg>
  </div>
  <h2 style="font-size:18px;font-weight:700;letter-spacing:-0.02em;margin:0 0 10px;">Check your email</h2>
  <p class="text-muted" style="font-size:13px;margin:0 0 4px;">We sent a magic link to</p>
  <p style="font-size:14px;font-weight:600;color:#f1f5f9;margin:0 0 16px;">{{ email }}</p>
  <p class="text-muted" style="font-size:11px;margin:0 0 20px;">Link expires in 15 minutes.</p>
  <a href="/auth/login" class="link-blue" style="font-size:13px;">← Try a different email</a>
</div>
{% endblock %}
