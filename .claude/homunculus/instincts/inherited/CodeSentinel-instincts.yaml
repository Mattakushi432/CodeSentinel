# CodeSentinel Workflow Multi Route Backend Change With Tests

## Action

Follow the multi-route-backend-change-with-tests workflow:
1. Edit multiple files in app/routers/ (e.g., auth.py, billing.py, repositories.py, reviews.py, rules.py, webhooks.py) to implement the change.
2. Update shared backend logic or middleware (e.g., app/main.py, app/services/).
3. Update or add Pydantic models or database logic if needed (e.g., app/models/, app/database.py).
4. Update or add tests in tests/ (e.g., tests/conftest.py, tests/test_auth_router.py) to cover new logic or edge cases.
5. Update requirements.txt if new dependencies are introduced.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: app/routers/auth.py, app/routers/billing.py, app/routers/dashboard.py

