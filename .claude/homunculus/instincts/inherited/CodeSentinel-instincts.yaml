# CodeSentinel Workflow Frontend Template And Css Feature

## Action

Follow the frontend-template-and-css-feature workflow:
1. Edit or add multiple HTML template files in app/templates/ (e.g., login, dashboard, reviews, partials).
2. Update shared CSS (e.g., app/static/css/main.css) to implement new styles or animations.
3. Optionally update or add JavaScript for interactive effects.
4. Test changes across all affected pages for consistency and accessibility.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: app/templates/auth/login.html, app/templates/auth/magic_link_sent.html, app/templates/base.html

